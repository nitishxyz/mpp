name: Deploy 

on:
  push:
    branches: [main]
    paths:
      - "mpp/**"
  pull_request:
    paths:
      - "mpp/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: mpp-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure pnpm store
        run: |
          pnpm config set store-dir ~/.pnpm-store
          mkdir -p ~/.pnpm-store

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: mpp/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: mpp
        run: pnpm install

      - name: Build site
        working-directory: mpp
        run: pnpm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: mpp
          command: deploy

  build-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configure pnpm store
        run: |
          pnpm config set store-dir ~/.pnpm-store
          mkdir -p ~/.pnpm-store

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: mpp/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: mpp
        run: pnpm install

      - name: Build site
        working-directory: mpp
        run: pnpm run build

      - name: Upload Preview Version
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: mpp
          command: versions upload

      - name: Post Preview Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}'
            const body = url
              ? `MPP Docs preview: ${url}`
              : 'MPP Docs preview failed to deploy.'
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const existing = comments.find((comment) => comment.body?.startsWith('MPP Docs preview:'))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
